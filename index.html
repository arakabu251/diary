    <div class="set-row">
        <label>文字サイズ</label>
        <select id="fontSizeSet" onchange="applyStyle()">
            <option value="16px">標準</option>
            <option value="22px">大きく</option>
            <option value="28px">特大</option>
        </select>
    </div>

    <div class="set-row">
        <label>マーカー</label>
        <div class="marker-box">
            <div onclick="mark('yellow')" class="m-btn" style="background:yellow;"></div>
            <div onclick="mark('#7fff00')" class="m-btn" style="background:#7fff00;"></div>
            <div onclick="mark('cyan')" class="m-btn" style="background:cyan;"></div>
            <div onclick="mark('transparent')" class="m-btn" style="background:white;"></div>
        </div>
    </div>
</div>

<script>
    function init() {
        if(!localStorage.getItem("yo_pin")) localStorage.setItem("yo_pin", "1234");
        document.getElementById("dateTag").innerText = new Date().toLocaleDateString('ja-JP', {year:'numeric', month:'long', day:'numeric', weekday:'short'});
        document.getElementById("gmailInput").value = localStorage.getItem("yo_gmail") || "";
        render();
    }
    function unlock() {
        if(document.getElementById("pinBox").value === localStorage.getItem("yo_pin")) document.getElementById("lockScreen").style.display="none";
        else alert("PINが違います");
    }
    function toggleSet() {
        const s = document.getElementById("settingsModal");
        s.style.display = (s.style.display === "block") ? "none" : "block";
    }
    function saveGmail() { localStorage.setItem("yo_gmail", document.getElementById("gmailInput").value); }
    function applyStyle() {
        document.body.style.fontFamily = document.getElementById("fontFamilySet").value;
        document.getElementById("textInput").style.fontSize = document.getElementById("fontSizeSet").value;
    }
    function mark(c) { document.execCommand("hiliteColor", false, c); }

    // 【修正点】リアルタイムプレビューを写真と動画で分けて処理
    async function handlePreview() {
        const photoGrid = document.getElementById("photoPreviewGrid");
        const videoArea = document.getElementById("videoPreviewArea");
        photoGrid.innerHTML = "";
        videoArea.innerHTML = "";
        
        const files = document.getElementById("mediaInput").files;
        for(let f of files) {
            const url = URL.createObjectURL(f);
            if(f.type.startsWith('image')) {
                photoGrid.innerHTML += `<img src="${url}" class="preview-img">`;
            } else if(f.type.startsWith('video')) {
                videoArea.innerHTML += `<video src="${url}" class="preview-vid" controls muted></video>`;
            }
        }
    }

    async function save() {
        const text = document.getElementById("textInput").innerHTML;
        const files = document.getElementById("mediaInput").files;
        if(!text.trim() && files.length === 0) return;
        
        let mArr = [];
        for(let f of files) {
            const b64 = await new Promise(r => {
                const reader = new FileReader();
                reader.onload = e => r(e.target.result);
                reader.readAsDataURL(f);
            });
            mArr.push({ type: f.type.startsWith('video') ? 'v' : 'i', data: b64 });
        }

        const data = { id: Date.now(), date: new Date().toLocaleDateString('ja-JP'), day: new Date().getDate(), content: text, media: mArr };
        let db = JSON.parse(localStorage.getItem("yo_data") || "[]");
        db.unshift(data);
        localStorage.setItem("yo_data", JSON.stringify(db));
        
        document.getElementById("textInput").innerHTML = "";
        document.getElementById("mediaInput").value = "";
        document.getElementById("photoPreviewGrid").innerHTML = "";
        document.getElementById("videoPreviewArea").innerHTML = "";
        render(); alert("日記を保存しました！");
    }

    function render() {
        const log = document.getElementById("diaryLog");
        const cal = document.getElementById("calList");
        const db = JSON.parse(localStorage.getItem("yo_data") || "[]");
        log.innerHTML = ""; cal.innerHTML = "";

        for(let i=1; i<=31; i++) {
            const dot = document.createElement("div");
            dot.className = "day-dot " + (db.some(d => d.day === i) ? "day-active" : "");
            dot.innerText = i;
            cal.appendChild(dot);
        }

        db.forEach(item => {
            const card = document.createElement("div");
            card.className = "entry-card"; card.id = "card-"+item.id;
            let imgs = item.media.filter(m => m.type === 'i');
            let vids = item.media.filter(m => m.type === 'v');
            
            let mHtml = "";
            if(imgs.length > 0) {
                mHtml += '<div class="image-grid">';
                imgs.forEach(i => mHtml += `<img src="${i.data}">`);
                mHtml += '</div>';
            }
            vids.forEach(v => mHtml += `<div class="video-box"><video controls playsinline src="${v.data}"></video></div>`);

            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; color:#888; font-size:12px; margin-bottom:10px;">
                    ${item.date}
                    <button onclick="del(${item.id})" style="border:none; color:red; background:none;">削除</button>
                </div>
                <div style="white-space:pre-wrap;">${item.content}</div>
                ${mHtml}`;
            log.appendChild(card);
        });
    }

    function del(id) { if(confirm("削除しますか？")){ let db = JSON.parse(localStorage.getItem("yo_data")).filter(d=>d.id!==id); localStorage.setItem("yo_data", JSON.stringify(db)); render(); } }
    function makePDF() {
        const db = JSON.parse(localStorage.getItem("yo_data") || "[]");
        if(db.length === 0) return alert("日記がありません");
        const element = document.getElementById("card-"+db[0].id);
        html2pdf().from(element).set({ margin: 10, filename: `陽の日記_${db[0].date}.pdf`, html2canvas: { scale: 2 } }).save();
    }
</script>
</body>
</html>
