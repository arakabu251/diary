<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>陽の日記</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --main-bg: #f5f5f5; }
        body { font-family: sans-serif; margin: 0; background: var(--main-bg); color: #333; padding-bottom: 50px; }
        header { background: #222; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .settings-btn { font-size: 26px; cursor: pointer; background: none; border: none; color: white; padding: 0 10px; }
        .container { padding: 15px; }
        #text { border: 1px solid #ccc; padding: 15px; min-height: 200px; background: white; border-radius: 12px; margin-bottom: 10px; outline: none; font-size: 16px; line-height: 1.6; }
        .btn-group { display: flex; gap: 8px; margin-bottom: 15px; }
        .btn { flex: 1; padding: 12px; border-radius: 8px; border: none; color: white; font-weight: bold; font-size: 14px; text-align: center; cursor: pointer; }
        .btn-save { background: #28a745; }
        .btn-pdf { background: #dc3545; }
        #settingsModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; color: white; overflow-y: auto; }
        .modal-content { padding: 30px; }
        .setting-item { margin-bottom: 25px; border-bottom: 1px solid #444; padding-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #aaa; }
        select, input[type="password"] { width: 100%; padding: 12px; border-radius: 5px; border: none; font-size: 16px; margin-bottom: 10px; }
        .entry { background: white; padding: 15px; margin-top: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .date { font-weight: bold; color: #666; margin-bottom: 8px; font-size: 13px; display: flex; justify-content: space-between; }
        .del-btn { color: #dc3545; font-size: 12px; border: none; background: none; cursor: pointer; }
        img { max-width: 100%; border-radius: 8px; margin-top: 10px; display: block; }
        #lockScreen { position: fixed; inset: 0; background: #111; z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #pinInput { width: 60%; margin-bottom: 20px; text-align: center; font-size: 24px; }
        .marker-group { display: flex; gap: 10px; }
        .m-btn { width: 45px; height: 45px; border-radius: 50%; border: 2px solid white; cursor: pointer; }
    </style>
</head>
<body>

<div id="lockScreen">
    <h2 style="color:white; margin-bottom:20px;">🌞 陽の日記</h2>
    <input type="password" id="pinInput" placeholder="PIN" inputmode="numeric">
    <button onclick="unlock()" class="btn" style="background:#007bff; width:60%">解除</button>
</div>

<header>
    <div class="title">🌞 陽の日記</div>
    <button class="settings-btn" onclick="toggleSettings()">⚙️</button>
</header>

<div class="container">
    <div id="todayDisplay" style="margin-bottom:10px; font-weight:bold; color:#555;"></div>
    <div id="text" contenteditable="true" placeholder="今日の日記を書く..."></div>
    <input type="file" id="images" accept="image/*" multiple style="margin-bottom:15px; width:100%;">
    <div class="btn-group">
        <button onclick="saveEntry()" class="btn btn-save">保存</button>
        <button onclick="exportPDF()" class="btn btn-pdf">PDF化</button>
    </div>
    <div id="list"></div>
</div>

<div id="settingsModal">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h2 style="margin:0">設定</h2>
            <button onclick="toggleSettings()" style="background:none; border:none; color:white; font-size:40px;">×</button>
        </div>
        <div class="setting-item">
            <label>文字サイズ</label>
            <select id="fontSize" onchange="applyTextSettings()">
                <option value="16px">標準</option>
                <option value="22px">大</option>
                <option value="28px">特大</option>
            </select>
        </div>
        <div class="setting-item">
            <label>マーカー（選択後にタップ）</label>
            <div class="marker-group">
                <button onclick="applyMarker('yellow')" class="m-btn" style="background:yellow;"></button>
                <button onclick="applyMarker('lime')" class="m-btn" style="background:lime;"></button>
                <button onclick="applyMarker('transparent')" class="m-btn" style="background:white;"></button>
            </div>
        </div>
        <div class="setting-item">
            <label>データ保存（バックアップ）</label>
            <button onclick="exportBackup()" class="btn" style="background:#007bff; width:100%;">ファイルをダウンロード</button>
            <p style="font-size:11px; color:#aaa; margin-top:5px;">※機種変更時はこのファイルを保存してください</p>
        </div>
    </div>
</div>

<script>
    window.onload = () => {
        if(!localStorage.getItem("diary_pin")) localStorage.setItem("diary_pin", "1234");
        document.getElementById("todayDisplay").innerText = new Date().toLocaleDateString('ja-JP', {year:'numeric', month:'long', day:'numeric', weekday:'short'});
        loadEntries();
    };
    function toggleSettings() {
        const m = document.getElementById("settingsModal");
        m.style.display = m.style.display === "block" ? "none" : "block";
    }
    function unlock() {
        if(document.getElementById("pinInput").value === localStorage.getItem("diary_pin")) document.getElementById("lockScreen").style.display="none";
        else alert("PINが違います");
    }
    function applyTextSettings() {
        document.getElementById("text").style.fontSize = document.getElementById("fontSize").value;
    }
    function applyMarker(color) { document.execCommand("hiliteColor", false, color); }
    async function compressImg(file){
        return new Promise(resolve => {
            const img = new Image();
            const reader = new FileReader();
            reader.onload = e => img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement("canvas");
                const maxWidth = 500;
                const scale = maxWidth / img.width;
                canvas.width = maxWidth; canvas.height = img.height * scale;
                canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
                resolve(canvas.toDataURL("image/jpeg", 0.5));
            };
            reader.readAsDataURL(file);
        });
    }
    async function saveEntry(){
        const content = document.getElementById("text").innerHTML;
        const fileInput = document.getElementById("images").files;
        const dateKey = new Date().toISOString().split("T")[0];
        let imgData = [];
        for(let i=0; i < Math.min(fileInput.length, 3); i++) imgData.push(await compressImg(fileInput[i]));
        const newEntry = { id: Date.now(), date: dateKey, text: content, images: imgData };
        let entries = JSON.parse(localStorage.getItem("my_diary_data") || "[]");
        entries = entries.filter(e => e.date !== dateKey);
        entries.unshift(newEntry);
        localStorage.setItem("my_diary_data", JSON.stringify(entries));
        alert("保存しました");
        document.getElementById("text").innerHTML = ""; document.getElementById("images").value = "";
        loadEntries();
    }
    function loadEntries(){
        const entries = JSON.parse(localStorage.getItem("my_diary_data") || "[]");
        const listDiv = document.getElementById("list");
        listDiv.innerHTML = "";
        entries.forEach(entry => {
            const div = document.createElement("div");
            div.className = "entry"; div.id = "entry-" + entry.date;
            let imgsHtml = "";
            if(entry.images) entry.images.forEach(src => imgsHtml += `<img src="${src}">`);
            div.innerHTML = `<div class="date">${entry.date}<button class="del-btn" onclick="deleteEntry(${entry.id})">削除</button></div><div>${entry.text}</div>${imgsHtml}`;
            listDiv.appendChild(div);
        });
    }
    function deleteEntry(id) {
        if(!confirm("削除しますか？")) return;
        let entries = JSON.parse(localStorage.getItem("my_diary_data") || "[]");
        localStorage.setItem("my_diary_data", JSON.stringify(entries.filter(e => e.id !== id)));
        loadEntries();
    }
    function exportBackup() {
        const data = localStorage.getItem("my_diary_data");
        const blob = new Blob([data], {type: "application/json"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `diary_backup.json`;
        a.click();
    }
    function exportPDF(){
        const today = new Date().toISOString().split("T")[0];
        const target = document.getElementById("entry-" + today);
        if(!target) return alert("今日の日記を保存してください");
        html2pdf().from(target).save();
    }
</script>
</body>
</html>
